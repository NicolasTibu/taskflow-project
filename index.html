<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskflow - Gestor de Tareas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Taskflow</h1>
            <input type="text" id="search-input" placeholder="🔍 Buscar tarea...">
        </header>

        <form id="task-form">
            <input type="text" id="task-input" placeholder="Añadir nueva tarea..." required autocomplete="off">
            <button type="submit">Añadir</button>
        </form>
         <ul id="task-list"></ul>   
    </div>    
    <script src="app.js"></script>   
</body>
</html>
