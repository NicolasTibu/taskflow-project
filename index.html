<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>TaskFlow<span>.js</span></h1>
            <p id="date-display"></p>
        </header>

        <form id="task-form">
            <input type="text" id="task-input" placeholder="¿Qué planes tienes para hoy?" required>
            <button type="submit" id="add-btn">+</button>
        </form>

        <div class="stats">
            <span id="task-count">0 tareas pendientes</span>
        </div>

        <ul id="task-list">
            </ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
