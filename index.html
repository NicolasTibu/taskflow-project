<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Tu Espacio Productivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <div class="app-container glass">
        <header>
            <div class="header-top">
                <h1>Task<span class="accent">Flow</span></h1>
                <div id="mood-icon" class="mood-neutral"></div> 
            </div>
            <p class="subtitle">Gestiona tu día con fluidez</p>
        </header>

        <form id="task-form" class="neumorphic-form">
            <div class="input-row">
                <button type="button" id="emoji-btn" class="emoji-trigger" title="Emoji">✨</button>
                <div class="input-group flex-1">
                    <i class="fas fa-plus-circle input-icon"></i>
                    <input type="text" id="task-input" placeholder="Añadir una nueva tarea..." required maxlength="80">
                </div>
                <button type="submit" id="add-btn">
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
            <div class="form-options">
                <select id="priority-select" class="priority-select" title="Prioridad">
                    <option value="medium">Prioridad normal</option>
                    <option value="high">Alta</option>
                    <option value="low">Baja</option>
                </select>
                <input type="date" id="task-date" class="date-input" title="Fecha límite">
            </div>
            <div id="emoji-picker" class="emoji-picker hidden">
                <button type="button" class="emoji-opt">🎯</button>
                <button type="button" class="emoji-opt">💻</button>
                <button type="button" class="emoji-opt">📚</button>
                <button type="button" class="emoji-opt">🍎</button>
                <button type="button" class="emoji-opt">💪</button>
                <button type="button" class="emoji-opt">🛒</button>
                <button type="button" class="emoji-opt">🌟</button>
                <button type="button" class="emoji-opt">🎨</button>
                <button type="button" class="emoji-opt">☕</button>
                <button type="button" class="emoji-opt">📝</button>
            </div>
        </form>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="search-input" placeholder="Buscar entre tus tareas...">
        </div>

        <div class="filter-tabs">
            <button data-filter="all" class="filter-btn active">Todas</button>
            <button data-filter="pending" class="filter-btn">Pendientes</button>
            <button data-filter="completed" class="filter-btn">Completadas</button>
        </div>

        <div class="sort-bar">
            <label for="sort-select" class="sort-label"><i class="fas fa-sort-amount-down"></i> Ordenar por</label>
            <select id="sort-select" class="sort-select" title="Ordenación">
                <option value="recent">Más recientes</option>
                <option value="priority">Prioridad (alta → baja)</option>
                <option value="date">Fecha límite</option>
                <option value="text">Texto (A-Z)</option>
                <option value="pending">Pendientes primero</option>
            </select>
        </div>

        <div class="stats-bar">
            <span id="task-count">0 tareas restantes</span>
            <button id="clear-all-btn" class="text-btn hide"><i class="fas fa-broom"></i> Limpiar todo</button>
        </div>

        <ul id="task-list">
            </ul>
    </div>

    <div id="toast-container"></div>

    <audio id="sound-add" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="sound-delete" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
