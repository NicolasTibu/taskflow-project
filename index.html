<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Tu Espacio Productivo: Tailwind Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5' },
                        accent: '#00cec9'
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .filtered { display: none !important; }
            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
            .dark ::-webkit-scrollbar-thumb { background-color: #475569; }

            /* Ajuste de simetría para el selector de fecha nativo */
            input[type="date"]::-webkit-calendar-picker-indicator {
                cursor: pointer;
                border-radius: 6px;
                margin-right: 2px;
                opacity: 0.5;
                transition: all 0.2s;
            }
            input[type="date"]::-webkit-calendar-picker-indicator:hover {
                opacity: 1;
                transform: scale(1.1);
            }
            .dark input[type="date"]::-webkit-calendar-picker-indicator {
                filter: invert(1);
            }
        }
    </style>
</head>

<body class="bg-slate-100 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300 flex justify-center items-center p-4 relative overflow-hidden">

    <button id="theme-toggle" class="fixed top-5 right-5 z-50 p-3 bg-white dark:bg-slate-800 rounded-full hover:scale-110 focus:outline-none focus:ring-4 focus:ring-primary-500/50 transition-all duration-300 shadow-lg border border-slate-200 dark:border-slate-700">
        <i id="theme-icon" class="fas fa-moon text-slate-600 dark:text-yellow-400 text-lg"></i>
    </button>

    <div class="absolute w-[400px] h-[400px] bg-primary-500/20 dark:bg-primary-500/10 blur-[100px] rounded-full z-0 pointer-events-none"></div>

    <div class="w-full max-w-md bg-white/70 dark:bg-slate-800/70 backdrop-blur-xl p-8 rounded-[2rem] shadow-2xl border border-white/40 dark:border-slate-700/50 relative z-10 transition-all duration-300">
        
        <header class="mb-6">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-extrabold tracking-tight">Task<span class="text-primary-500 drop-shadow-[0_0_8px_rgba(99,102,241,0.5)]">Flow</span></h1>
                <div id="mood-icon" class="w-6 h-6 rounded-full transition-all duration-300 shadow-md bg-slate-400"></div> 
            </div>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Gestiona tu día con fluidez</p>
        </header>

        <form id="task-form" class="flex flex-col gap-4 mb-8 bg-slate-50/50 dark:bg-slate-900/20 p-4 rounded-2xl border border-slate-200 dark:border-slate-700">
    
            <div class="relative group">
                <i class="fas fa-feather-alt absolute left-4 top-1/2 -translate-y-1/2 text-primary-400 text-lg"></i>
                <input type="text" id="task-input" 
                    class="w-full pl-12 pr-12 py-4 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 focus:border-primary-500 rounded-2xl outline-none focus:ring-4 focus:ring-primary-500/10 transition-all text-lg placeholder-slate-400"
                    placeholder="¿Qué tienes en mente hoy?" required maxlength="80">
                
                <button type="button" id="emoji-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-2xl hover:scale-125 transition-transform focus:outline-none">
                    ✨
                </button>
            </div>

            <div class="flex flex-col sm:flex-row gap-3">
                <div class="relative flex-1 group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-calendar-day text-slate-400 group-focus-within:text-primary-500 transition-colors"></i>
                    </div>
                    <input type="date" id="task-date" 
                        class="w-full pl-11 pr-3 py-3 bg-white dark:bg-slate-900 border-2 border-slate-100 dark:border-slate-800 focus:border-primary-500 rounded-xl outline-none transition-all text-sm text-slate-600 dark:text-slate-300 min-h-[52px]">
                </div>

                <button type="submit" id="add-btn" class="bg-primary-500 hover:bg-primary-600 text-white font-bold px-8 rounded-xl hover:shadow-lg hover:shadow-primary-500/30 active:scale-95 transition-all flex justify-center items-center py-3 gap-2">
                    <span>Añadir</span>
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>

            <div id="emoji-picker" class="hidden flex flex-wrap justify-center gap-2 p-3 bg-white dark:bg-slate-800 shadow-2xl border border-slate-200 dark:border-slate-700 rounded-xl">
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">🎯</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">💻</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">📚</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">🍎</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">💪</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">🛒</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">🌟</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">🎨</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">☕</button>
                <button type="button" class="emoji-opt hover:bg-primary-50 dark:hover:bg-primary-900/20 p-2 rounded-lg text-xl transition-all">📝</button>
            </div>
        </form>

        <div class="relative mb-4 group">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="search-input" 
                class="w-full pl-10 pr-4 py-2 bg-slate-50 dark:bg-slate-900/30 border border-slate-200 dark:border-slate-700 rounded-lg text-sm outline-none focus:ring-2 focus:ring-primary-500/50 transition-all duration-300 placeholder-slate-400 text-slate-700 dark:text-slate-200"
                placeholder="Buscar tareas...">
        </div>

        <div class="flex gap-2 mb-6 p-1 bg-slate-100 dark:bg-slate-900/50 rounded-xl">
            <button data-filter="all" class="filter-btn flex-1 py-1.5 text-[10px] font-bold rounded-lg transition-all bg-white dark:bg-slate-800 shadow-sm text-primary-500">TODAS</button>
            <button data-filter="today" class="filter-btn flex-1 py-1.5 text-[10px] font-bold rounded-lg transition-all text-slate-500 hover:bg-white/50 dark:hover:bg-slate-800/50">HOY</button>
            <button data-filter="week" class="filter-btn flex-1 py-1.5 text-[10px] font-bold rounded-lg transition-all text-slate-500 hover:bg-white/50 dark:hover:bg-slate-800/50">SEMANA</button>
        </div>

        <div class="flex justify-between items-center text-xs text-slate-500 dark:text-slate-400 mb-4 px-1 font-medium">
            <span id="task-count">0 tareas pendientes</span>
            <button id="clear-all-btn" class="hover:text-red-500 dark:hover:text-red-400 transition-colors duration-200 hidden flex items-center">
                <i class="fas fa-broom mr-1"></i> Limpiar todo
            </button>
        </div>

        <ul id="task-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2"></ul>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3"></div>

    <audio id="sound-add" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
    <audio id="sound-delete" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>

    <script src="app.js"></script>
</body>
</html>
